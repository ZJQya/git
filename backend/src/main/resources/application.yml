server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/data_mining?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: localhost      # 默认
      port: 6379           # 默认
      # timeout: 2000ms


